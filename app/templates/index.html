<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票技术面评分</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --dim: #6b7187;
    --green: #22c55e;
    --orange: #f59e0b;
    --blue: #3b82f6;
    --red: #ef4444;
    --accent: #6366f1;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 60px 20px;
  }

  .app {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 1px;
  }

  /* 搜索区 */
  .search-wrapper {
    position: relative;
    width: 100%;
  }

  .search-box {
    display: flex;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0 16px;
    height: 52px;
    transition: border-color 0.2s;
  }

  .search-box:focus-within {
    border-color: var(--accent);
  }

  .search-box svg {
    width: 20px;
    height: 20px;
    color: var(--dim);
    flex-shrink: 0;
  }

  .search-box input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 16px;
    padding: 0 12px;
  }

  .search-box input::placeholder { color: var(--dim); }

  .search-box .clear-btn {
    background: none;
    border: none;
    color: var(--dim);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
    display: none;
    line-height: 1;
  }

  .search-box .clear-btn.visible { display: block; }

  /* 下拉建议 */
  .suggestions {
    position: absolute;
    top: 56px;
    left: 0;
    right: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-height: 320px;
    overflow-y: auto;
    display: none;
    z-index: 10;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .suggestions.open { display: block; }

  .suggestion-item {
    padding: 12px 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .suggestion-item:last-child { border-bottom: none; }

  .suggestion-item:hover { background: rgba(99,102,241,0.1); }

  .suggestion-item .stock-name { font-weight: 500; }

  .suggestion-item .stock-code {
    color: var(--dim);
    font-size: 13px;
    font-family: "JetBrains Mono", "Fira Code", monospace;
  }

  .suggestions .empty {
    padding: 16px;
    text-align: center;
    color: var(--dim);
    font-size: 14px;
  }

  /* 结果卡片 */
  .result-card {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    display: none;
  }

  .result-card.visible { display: block; }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .card-header .stock-info { display: flex; flex-direction: column; gap: 2px; }

  .card-header .stock-name { font-size: 20px; font-weight: 600; }

  .card-header .stock-meta {
    font-size: 13px;
    color: var(--dim);
    display: flex;
    gap: 8px;
  }

  /* 等级徽章 */
  .grade-badge {
    font-size: 28px;
    font-weight: 700;
    width: 56px;
    height: 56px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    flex-shrink: 0;
  }

  .grade-A { background: var(--green); }
  .grade-B { background: #4ade80; }
  .grade-C { background: var(--orange); }
  .grade-D { background: #f97316; }
  .grade-E { background: var(--red); }

  /* 总分区 */
  .total-score-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .total-score-num {
    font-size: 36px;
    font-weight: 700;
    font-family: "JetBrains Mono", "Fira Code", monospace;
    min-width: 70px;
  }

  .total-bar-wrap {
    flex: 1;
    height: 10px;
    background: rgba(255,255,255,0.06);
    border-radius: 5px;
    overflow: hidden;
  }

  .total-bar-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 0.6s ease, background 0.3s;
  }

  /* 维度得分条 */
  .dim-bars { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }

  .dim-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .dim-label {
    width: 64px;
    font-size: 12px;
    color: var(--dim);
    text-align: right;
    flex-shrink: 0;
    line-height: 1.2;
  }

  .dim-bar-wrap {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
  }

  .dim-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--accent);
    transition: width 0.6s ease;
  }

  .dim-score {
    width: 48px;
    font-size: 12px;
    font-family: "JetBrains Mono", "Fira Code", monospace;
    color: var(--dim);
    text-align: left;
  }

  /* 形态描述 */
  .morphology {
    padding: 12px 16px;
    background: rgba(99,102,241,0.08);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-size: 14px;
    color: #c4c9d9;
  }

  /* 加载/错误提示 */
  .status-msg {
    text-align: center;
    color: var(--dim);
    font-size: 14px;
    padding: 8px 0;
  }

  .status-msg.error { color: var(--red); }
</style>
</head>
<body>
<div class="app">
  <h1>股票技术面评分</h1>

  <div class="search-wrapper">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="输入股票名称或代码，如 平安银行、000001" autocomplete="off">
      <button class="clear-btn" id="clearBtn" title="清除">✕</button>
    </div>
    <div class="suggestions" id="suggestions"></div>
  </div>

  <div class="status-msg" id="statusMsg"></div>

  <div class="result-card" id="resultCard">
    <div class="card-header">
      <div class="stock-info">
        <span class="stock-name" id="stockName">--</span>
        <span class="stock-meta">
          <span id="stockCode">--</span>
          <span id="tradeDate">--</span>
        </span>
      </div>
      <div class="grade-badge" id="gradeBadge">--</div>
    </div>

    <div class="total-score-row">
      <span class="total-score-num" id="totalScore">--</span>
      <div class="total-bar-wrap">
        <div class="total-bar-fill" id="totalBar" style="width: 0%"></div>
      </div>
    </div>

    <div class="dim-bars" id="dimBars"></div>

    <div class="morphology" id="morphology"></div>
  </div>
</div>

<script>
const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');
const suggestionsEl = document.getElementById('suggestions');
const resultCard = document.getElementById('resultCard');
const statusMsg = document.getElementById('statusMsg');

let debounceTimer = null;
let selectedIndex = -1;
let suggestionItems = [];

// 颜色生成
function scoreColor(score, max) {
  const ratio = score / max;
  if (ratio >= 0.7) return 'var(--green)';
  if (ratio >= 0.5) return 'var(--orange)';
  return 'var(--red)';
}

// 获取等级 class
function gradeClass(grade) {
  const map = { A: 'grade-A', B: 'grade-B', C: 'grade-C', D: 'grade-D', E: 'grade-E' };
  return map[grade] || 'grade-C';
}

// 搜索建议
async function fetchSuggestions(keyword) {
  try {
    const resp = await fetch('/api/v1/search?keyword=' + encodeURIComponent(keyword));
    const json = await resp.json();
    return json.code === 0 ? json.data : [];
  } catch {
    return [];
  }
}

// 渲染建议列表
function renderSuggestions(items) {
  suggestionsEl.innerHTML = '';
  suggestionItems = items;
  selectedIndex = -1;

  if (!items.length) {
    suggestionsEl.innerHTML = '<div class="empty">未找到匹配股票</div>';
    suggestionsEl.classList.add('open');
    return;
  }

  items.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'suggestion-item';
    div.innerHTML = `<span class="stock-name">${escapeHtml(item.name)}</span><span class="stock-code">${escapeHtml(item.code)}</span>`;
    div.addEventListener('mousedown', () => selectStock(item));
    div.addEventListener('mouseenter', () => {
      suggestionsEl.querySelectorAll('.suggestion-item').forEach(el => el.style.background = '');
      div.style.background = 'rgba(99,102,241,0.1)';
    });
    suggestionsEl.appendChild(div);
  });

  suggestionsEl.classList.add('open');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// 选中股票
async function selectStock(item) {
  searchInput.value = item.name;
  suggestionsEl.classList.remove('open');
  clearBtn.classList.add('visible');
  clearStatus();

  // 加载评分
  statusMsg.textContent = '正在获取评分...';
  statusMsg.className = 'status-msg';
  resultCard.classList.remove('visible');

  try {
    const resp = await fetch('/api/v1/rating/' + encodeURIComponent(item.code));
    const json = await resp.json();
    if (json.code === 0 && json.data) {
      renderResult(json.data);
    } else {
      showError('评分配额不足或数据异常，请稍后重试');
    }
  } catch {
    showError('网络异常，请检查服务是否启动');
  }
}

// 渲染评分结果
function renderResult(data) {
  statusMsg.textContent = '';
  document.getElementById('stockName').textContent = data.stock_name;
  document.getElementById('stockCode').textContent = data.stock_code;
  document.getElementById('tradeDate').textContent = data.trade_date;

  const gradeEl = document.getElementById('gradeBadge');
  gradeEl.textContent = data.grade;
  gradeEl.className = 'grade-badge ' + gradeClass(data.grade);

  document.getElementById('totalScore').textContent = data.total_score;
  const totalBar = document.getElementById('totalBar');
  totalBar.style.width = (data.total_score / data.max_score * 100) + '%';
  totalBar.style.background = scoreColor(data.total_score, data.max_score);

  // 维度得分条
  const dims = [
    { key: 'ma_structure', label: '均线结构' },
    { key: 'macd', label: 'MACD动能' },
    { key: 'volume_price', label: '量价关系' },
    { key: 'capital_flow', label: '大单净量' },
    { key: 'chip_distribution', label: '筹码分布' },
  ];

  let dimHtml = '';
  dims.forEach(d => {
    const dim = data.details[d.key];
    if (!dim) return;
    const pct = dim.score / dim.max * 100;
    dimHtml += `
      <div class="dim-row">
        <span class="dim-label">${d.label}</span>
        <div class="dim-bar-wrap">
          <div class="dim-bar-fill" style="width: ${pct}%; background: ${scoreColor(dim.score, dim.max)}"></div>
        </div>
        <span class="dim-score">${dim.score}/${dim.max}</span>
      </div>`;
  });
  document.getElementById('dimBars').innerHTML = dimHtml;
  document.getElementById('morphology').textContent = data.morphology;
  resultCard.classList.add('visible');
}

function showError(msg) {
  statusMsg.textContent = msg;
  statusMsg.className = 'status-msg error';
  resultCard.classList.remove('visible');
}

function clearStatus() {
  statusMsg.textContent = '';
  statusMsg.className = 'status-msg';
}

// 事件监听
searchInput.addEventListener('input', () => {
  const val = searchInput.value.trim();

  if (val) {
    clearBtn.classList.add('visible');
  } else {
    clearBtn.classList.remove('visible');
    suggestionsEl.classList.remove('open');
    return;
  }

  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(async () => {
    const items = await fetchSuggestions(val);
    // 确保仍是当前输入
    if (searchInput.value.trim() === val) {
      renderSuggestions(items);
    }
  }, 250);
});

searchInput.addEventListener('keydown', (e) => {
  const items = suggestionsEl.querySelectorAll('.suggestion-item');
  if (!suggestionsEl.classList.contains('open') || !items.length) return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    selectedIndex = Math.min(selectedIndex + 1, items.length - 1);
    updateSelection(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    selectedIndex = Math.max(selectedIndex - 1, 0);
    updateSelection(items);
  } else if (e.key === 'Enter' && selectedIndex >= 0) {
    e.preventDefault();
    selectStock(suggestionItems[selectedIndex]);
  } else if (e.key === 'Escape') {
    suggestionsEl.classList.remove('open');
  }
});

function updateSelection(items) {
  items.forEach((el, i) => {
    el.style.background = i === selectedIndex ? 'rgba(99,102,241,0.1)' : '';
  });
}

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearBtn.classList.remove('visible');
  suggestionsEl.classList.remove('open');
  clearStatus();
  resultCard.classList.remove('visible');
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-wrapper')) {
    suggestionsEl.classList.remove('open');
  }
});
</script>
</body>
</html>
